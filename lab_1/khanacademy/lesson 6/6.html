<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Project: Event Invite</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, sans-serif;
                background: rgb(255, 245, 230);
                color: #333;
                text-align: center;
                padding: 50px;
            }

            h1 {
                font-family: 'Cursive', sans-serif;
                color: #ff6600;
                font-size: 3em;
                margin-bottom: 0;
            }

            h2 {
                color: #ff9933;
                font-size: 1.8em;
                margin-top: 5px;
            }

            .details {
                background: rgb(255, 255, 200);
                border: 2px solid #ffcc66;
                padding: 20px;
                margin: 30px auto;
                width: 60%;
                border-radius: 15px;
            }

            ul {
                list-style: none;
                padding: 0;
            }

            ul li {
                padding: 5px 0;
                font-weight: bold;
            }

            .rsvp-button {
                display: inline-block;
                background-color: #ff6600;
                color: white;
                padding: 15px 30px;
                text-decoration: none;
                font-weight: bold;
                border-radius: 10px;
                margin-top: 20px;
                transition: background 0.3s;
            }

            .rsvp-button:hover {
                background-color: #ff9933;
            }
        </style>
    </head>
    <body>
        
        <h1>You're Invited!</h1>
        <h2>To the Grand Summer Bash!</h2>
        
        <div class="details">
            <p>Event Details:</p>
            <ul>
                <li>Date: June 15, 2026</li>
                <li>Time: 6:00 PM - 11:00 PM</li>
                <li>Location: Sunny Beach Park, Main Pavilion</li>
                <li>Dress Code: Casual & Colorful</li>
            </ul>
            
            <p>Guest List:</p>
            <ul>
                <li>Anna</li>
                <li>Mike</li>
                <li>Olaf</li>
                <li>Jamie</li>
            </ul>

            <a class="rsvp-button" href="mailto:host@example.com?subject=RSVP%20Summer%20Bash">RSVP Now!</a>
        </div>

    </body>
</html>
